<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>غرف المواد — PlayVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a1a; --card-bg:#151528; --accent:#7c3aed; --accent2:#06b6d4;
  --gold:#f59e0b; --green:#10b981; --pink:#ec4899; --red:#ef4444;
  --text:#e2e8f0; --text-dim:#94a3b8; --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo','Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* خلفية متحركة */
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.22;animation:drift 22s ease-in-out infinite}
.orb1{width:280px;height:280px;background:var(--accent);top:-60px;right:-60px}
.orb2{width:240px;height:240px;background:var(--accent2);bottom:-50px;left:-50px;animation-delay:-8s}
.orb3{width:200px;height:200px;background:var(--gold);top:45%;left:45%;animation-delay:-14s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(28px,-24px) scale(1.14)}}

.wrap{position:relative;z-index:2;max-width:920px;margin:0 auto;padding:16px 14px 40px}

/* رأس الصفحة */
.top{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.back{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);color:var(--text);
  border-radius:12px;padding:9px 14px;font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s}
.back:hover{background:rgba(255,255,255,.16)}
.back:active{transform:scale(.95)}
h1{font-size:clamp(1.2rem,4.6vw,1.9rem);font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--accent2));-webkit-background-clip:text;
  background-clip:text;-webkit-text-fill-color:transparent;line-height:1.5}
.sub{color:var(--text-dim);font-size:.82rem;margin-top:2px}

/* شبكة البطاقات */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
.card{background:var(--card-bg);border:2px solid rgba(255,255,255,.08);border-radius:var(--radius);
  padding:16px 12px;text-align:center;cursor:pointer;transition:.25s;position:relative;overflow:hidden;
  opacity:0;animation:pop .45s forwards}
@keyframes pop{0%{opacity:0;transform:translateY(14px) scale(.95)}100%{opacity:1;transform:none}}
.card:hover{transform:translateY(-4px);border-color:var(--c,var(--accent));box-shadow:0 8px 26px rgba(0,0,0,.5)}
.card:active{transform:scale(.97)}
.card::after{content:'';position:absolute;top:0;left:-70%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);
  transform:skewX(-20deg);animation:shine 5s infinite}
@keyframes shine{0%{left:-70%}55%,100%{left:130%}}
.ic{font-size:2rem;display:block;margin-bottom:6px}
.nm{font-weight:900;font-size:.98rem;color:var(--text)}
.dsc{font-size:.7rem;color:var(--text-dim);margin-top:3px;line-height:1.6}
.pill{display:inline-block;margin-top:7px;font-size:.66rem;font-weight:700;padding:2px 9px;border-radius:20px;
  background:rgba(255,255,255,.08);color:var(--text-dim)}

/* أقسام الغرفة */
.sec{margin-top:22px}
.sec-h{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:7px;
  border-bottom:2px solid rgba(255,255,255,.08)}
.sec-h .e{font-size:1.3rem}
.sec-h .t{font-weight:900;font-size:1.02rem}
.sec-h .n{margin-inline-start:auto;font-size:.72rem;color:var(--text-dim)}

.item{display:flex;align-items:center;gap:11px;background:var(--card-bg);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:11px 13px;margin-bottom:8px;
  cursor:pointer;transition:.2s;text-decoration:none;color:inherit}
.item:hover{border-color:var(--c,var(--accent));transform:translateX(-4px)}
.item .ii{flex-shrink:0;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:1.25rem;background:rgba(255,255,255,.06)}
.item .it{flex:1;min-width:0}
.item .it b{display:block;font-size:.92rem;font-weight:700}
.item .it span{display:block;font-size:.72rem;color:var(--text-dim);margin-top:2px;line-height:1.5}
.item .go{flex-shrink:0;color:var(--text-dim);font-size:1.1rem}

.empty{text-align:center;padding:26px 14px;color:var(--text-dim);
  background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.14);border-radius:14px;
  font-size:.85rem;line-height:1.9}
.empty .big{font-size:2.1rem;display:block;margin-bottom:6px;opacity:.6}

.pg{display:none}
.pg.on{display:block;animation:fadeIn .35s}
@keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="bg-fx"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>

<div class="wrap">

  <!-- 1) المواد -->
  <div id="pgSubjects" class="pg on">
    <div class="top">
      <button class="back" onclick="location.href='index.html'">🏠 الرئيسية</button>
      <div><h1>📚 غرف المواد</h1><div class="sub">اختر المادة ثم الصف</div></div>
    </div>
    <div class="grid" id="subjGrid"></div>
  </div>

  <!-- 2) الصفوف -->
  <div id="pgGrades" class="pg">
    <div class="top">
      <button class="back" onclick="showSubjects()">🔙 المواد</button>
      <div><h1 id="gradeTitle"></h1><div class="sub" id="gradeSub"></div></div>
    </div>
    <div class="grid" id="gradeGrid"></div>
  </div>

  <!-- 3) الغرفة -->
  <div id="pgRoom" class="pg">
    <div class="top">
      <button class="back" onclick="backToGrades()">🔙 الصفوف</button>
      <div><h1 id="roomTitle"></h1><div class="sub" id="roomSub"></div></div>
    </div>

    <div class="sec">
      <div class="sec-h"><span class="e">🎬</span><span class="t">فيديوهات تحفيزية</span><span class="n" id="vidN"></span></div>
      <div id="vidList"></div>
    </div>

    <div class="sec">
      <div class="sec-h"><span class="e">🎮</span><span class="t">ألعاب تعليمية</span><span class="n" id="gameN"></span></div>
      <div id="gameList"></div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   ✏️  لإضافة محتوى: اكتبي السطر داخل المادة والصف المناسبين.
   videos: [ {t:"اسم الفيديو", d:"وصف قصير", url:"my_video.mp4"} ]
   games:  [ {t:"اسم اللعبة",  d:"وصف قصير", url:"my_game.html"} ]
   ============================================================ */

var CONTENT = {
  // مثال جاهز — احذفيه أو عدّليه:
  "bio-10": {
    games: [
      { t:"عالم اللومو والنواة السحرية", d:"الخلية الحيوانية والنباتية والانقسام", url:"lumo.html" },
      { t:"بابجينو — مملكة الطلائعيات", d:"تصنيف الطلائعيات وأمراضها", url:"babgino.html" }
    ]
  },
  "ar-10": {
    games: [ { t:"القصر الملعون", d:"التصغير والقواعد العربية", url:"castle.html" } ]
  }
};

var SUBJECTS = [
  { k:"pre",   n:"ما قبل المدرسة", ic:"🧸", c:"#ec4899", grades:["عام"],                          gk:["gen"] },
  { k:"kg1",   n:"روضة أولى KG1",  ic:"🎨", c:"#f472b6", grades:["عام"],                          gk:["gen"] },
  { k:"kg2",   n:"روضة ثانية KG2", ic:"🖍️", c:"#fb7185", grades:["عام"],                          gk:["gen"] },
  { k:"sci",   n:"علوم",           ic:"🔬", c:"#10b981", grades:g(1,8),  gk:gk(1,8) },
  { k:"bio",   n:"أحياء",          ic:"🧬", c:"#34d399", grades:g(10,11),gk:gk(10,11) },
  { k:"chem",  n:"كيمياء",         ic:"⚗️", c:"#06b6d4", grades:g(9,11), gk:gk(9,11) },
  { k:"math",  n:"رياضيات",        ic:"➗", c:"#f59e0b", grades:g(1,11), gk:gk(1,11) },
  { k:"ar",    n:"لغة عربية",      ic:"📖", c:"#7c3aed", grades:g(1,11), gk:gk(1,11) },
  { k:"en",    n:"إنجليزي",        ic:"🔤", c:"#3b82f6", grades:g(1,11), gk:gk(1,11) },
  { k:"soc",   n:"اجتماعيات",      ic:"🌍", c:"#eab308", grades:g(1,11), gk:gk(1,11) },
  { k:"rel",   n:"تربية إسلامية",  ic:"🕌", c:"#22c55e", grades:g(1,11), gk:gk(1,11) }
];

function g(a,b){ var o=[]; for(var i=a;i<=b;i++) o.push("الصف "+arNum(i)); return o; }
function gk(a,b){ var o=[]; for(var i=a;i<=b;i++) o.push(String(i)); return o; }
function arNum(n){
  var names={1:"الأول",2:"الثاني",3:"الثالث",4:"الرابع",5:"الخامس",6:"السادس",
             7:"السابع",8:"الثامن",9:"التاسع",10:"العاشر",11:"الحادي عشر"};
  return names[n]||n;
}

var curSubj = null;

function esc(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function show(id){
  var ps=document.querySelectorAll('.pg');
  for(var i=0;i<ps.length;i++) ps[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}

/* --- المواد --- */
function showSubjects(){
  var el=document.getElementById('subjGrid'), h='';
  for(var i=0;i<SUBJECTS.length;i++){
    var s=SUBJECTS[i];
    h+='<div class="card" style="--c:'+s.c+';animation-delay:'+(i*0.04)+'s" onclick="openSubject(\''+s.k+'\')">'
      +'<span class="ic">'+s.ic+'</span>'
      +'<div class="nm">'+s.n+'</div>'
      +'<span class="pill">'+s.grades.length+' غرفة</span>'
      +'</div>';
  }
  el.innerHTML=h;
  show('pgSubjects');
}

/* --- الصفوف --- */
function openSubject(k){
  var s=null;
  for(var i=0;i<SUBJECTS.length;i++) if(SUBJECTS[i].k===k) s=SUBJECTS[i];
  if(!s) return;
  curSubj=s;
  document.getElementById('gradeTitle').textContent=s.ic+' '+s.n;
  document.getElementById('gradeSub').textContent='اختر الصف';
  var h='';
  for(var j=0;j<s.grades.length;j++){
    var gname=s.grades[j], gkey=s.gk[j];
    var c=countRoom(s.k+'-'+gkey);
    h+='<div class="card" style="--c:'+s.c+';animation-delay:'+(j*0.035)+'s" onclick="openRoom(\''+gkey+'\')">'
      +'<span class="ic">'+s.ic+'</span>'
      +'<div class="nm">'+gname+'</div>'
      +'<div class="dsc">'+(c ? (c+' عنصر') : 'قريباً')+'</div>'
      +'</div>';
  }
  document.getElementById('gradeGrid').innerHTML=h;
  show('pgGrades');
}
function backToGrades(){ if(curSubj) openSubject(curSubj.k); else showSubjects(); }

function countRoom(key){
  var r=CONTENT[key]; if(!r) return 0;
  return ((r.videos&&r.videos.length)||0)+((r.games&&r.games.length)||0);
}

/* --- الغرفة --- */
function openRoom(gkey){
  var s=curSubj; if(!s) return;
  var idx=s.gk.indexOf(gkey);
  var gname=idx>=0 ? s.grades[idx] : '';
  document.getElementById('roomTitle').textContent=s.ic+' '+s.n;
  document.getElementById('roomSub').textContent=gname;

  var r=CONTENT[s.k+'-'+gkey]||{};
  renderList('vidList','vidN',r.videos,'🎬',s.c,'لم تُضف فيديوهات لهذه الغرفة بعد');
  renderList('gameList','gameN',r.games,'🎮',s.c,'لم تُضف ألعاب لهذه الغرفة بعد');
  show('pgRoom');
}

function renderList(listId,countId,arr,icon,color,emptyMsg){
  var box=document.getElementById(listId), cn=document.getElementById(countId);
  if(!arr||!arr.length){
    cn.textContent='0';
    box.innerHTML='<div class="empty"><span class="big">'+icon+'</span>'+emptyMsg+'<br><small style="opacity:.7">قريباً بإذن الله</small></div>';
    return;
  }
  cn.textContent=arr.length;
  var h='';
  for(var i=0;i<arr.length;i++){
    var it=arr[i];
    h+='<a class="item" style="--c:'+color+'" href="'+esc(it.url)+'">'
      +'<div class="ii">'+icon+'</div>'
      +'<div class="it"><b>'+esc(it.t)+'</b><span>'+esc(it.d||'')+'</span></div>'
      +'<div class="go">‹</div></a>';
  }
  box.innerHTML=h;
}

showSubjects();
</script>
</body>
</html>
